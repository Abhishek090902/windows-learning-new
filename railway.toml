[build]
builder = "RAILPACK"
buildCommand = "npm run build --workspace=windows-learning-backend"

[deploy]
preDeployCommand = "npm run prisma:migrate:deploy --workspace=windows-learning-backend"
startCommand = "npm run start --workspace=windows-learning-backend"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
